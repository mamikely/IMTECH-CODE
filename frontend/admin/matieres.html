<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion des Matières - IMTECH-Educ</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="../css/admin.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="admin-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1><i class="fas fa-graduation-cap"></i> IMTECH-Educ</h1>
                <p>Administration</p>
            </div>
             <nav class="sidebar-menu">
                <div class="menu-section">
                  
                    <a href="classes.html" class="menu-item">
                        <i class="fas fa-chalkboard"></i><span>Classes</span>
                    </a>
                    <a href="annees-scolaires.html" class="menu-item active">
                        <i class="fas fa-calendar-alt"></i><span>Années Scolaires</span>
                    </a>
                    
                    <a href="matieres.html" class="menu-item">
                        <i class="fas fa-book"></i><span>Matières</span>
                    </a>
                    <a href="utilisateurs.html" class="menu-item">
                        <i class="fas fa-user-cog"></i><span>Utilisateurs</span>
                    </a>
                </div>
                <div class="menu-section">
                    <div class="menu-section-title">Académique</div>
                    <a href="trimestres.html" class="menu-item">
                        <i class="fas fa-calendar-week"></i><span>Trimestres</span>
                    </a>
                   
                </div>
                <div class="menu-section">
                    <div class="menu-section-title">Finances</div>
                    <a href="tarifs.html" class="menu-item">
                        <i class="fas fa-tag"></i><span>Tarifs</span>
                    </a>
                </div>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar"><i class="fas fa-user"></i></div>
                    <div class="user-details">
                        <h4 id="userRole">Administrateur</h4>
                        
                    </div>
                </div>
                <button class="btn-logout" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> Déconnexion
                </button>
            </div>
        </aside>
        
        <main class="main-content">
            <div class="top-bar">
                <div class="page-title">
                    <button class="mobile-menu-toggle" id="mobileMenuToggle">
                        <i class="fas fa-bars"></i>
                    </button>
                    <i class="fas fa-book"></i>
                    <h2>Gestion des Matières</h2>
                </div>
                <div class="top-bar-actions">
                    <span id="currentDate"></span>
                </div>
            </div>

            <div class="content-wrapper">
                <div class="toolbar">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="searchInput" placeholder="Rechercher une matière...">
                    </div>
                    <div class="toolbar-actions">
                        <button class="btn btn-success" onclick="openAddModal()">
                            <i class="fas fa-plus"></i> Nouvelle Matière
                        </button>
                        <button class="btn btn-primary" onclick="exportMatiereCSV()">
                            <i class="fas fa-file-csv"></i> Export CSV
                        </button>
                    </div>
                </div>

                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Nom</th>
                                <th>Coefficient</th>
                                <th>Classe</th>
                                <th>Description</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="matiereTableBody">
                            <tr>
                                <td colspan="5" class="text-center">
                                    <div class="loading"></div> Chargement des données...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div id="matiereModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">
                    <i class="fas fa-plus"></i> Nouvelle Matière
                </h3>
                <button class="modal-close" onclick="closeModal('matiereModal')">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <form id="matiereForm">
                    <input type="hidden" id="matiereId" name="id">
                    <div class="form-group">
                        <label for="nom"><i class="fas fa-book"></i> Nom de la Matière *</label>
                        <input type="text" id="nom" name="nom" required placeholder="">
                    </div>
                    <div class="form-group">
                        <label for="coefficient"><i class="fas fa-sort-numeric-up"></i> Coefficient *</label>
                        <input type="text" id="coefficient" name="coefficient" required placeholder="">
                    </div>
                    <div class="form-group">
                        <label for="description"><i class="fas fa-align-left"></i> Description </label>
                        <textarea id="description" name="description"  placeholder=""></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeModal('matiereModal')">
                    <i class="fas fa-times"></i> Annuler
                </button>
                <button type="button" class="btn btn-primary" onclick="saveMatiere()">
                    <i class="fas fa-save"></i> Enregistrer
                </button>
            </div>
        </div>
    </div>

    <script src="../configuration/config.js"></script>
    <script src="../js/admin-utils.js"></script>
    <script src="../js/matieres.js"></script>
</body>
</html>
