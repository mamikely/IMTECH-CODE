<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion des Années Scolaires - IMTECH-Educ</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="../css/admin.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="admin-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1><i class="fas fa-graduation-cap"></i> IMTECH-Educ</h1>
                <p>Administration</p>
            </div>
            <nav class="sidebar-menu">
                <div class="menu-section">
                  
                    <a href="classes.html" class="menu-item">
                        <i class="fas fa-chalkboard"></i><span>Classes</span>
                    </a>
                    <a href="annees-scolaires.html" class="menu-item active">
                        <i class="fas fa-calendar-alt"></i><span>Années Scolaires</span>
                    </a>
                    
                    <a href="matieres.html" class="menu-item">
                        <i class="fas fa-book"></i><span>Matières</span>
                    </a>
                    <a href="utilisateurs.html" class="menu-item">
                        <i class="fas fa-user-cog"></i><span>Utilisateurs</span>
                    </a>
                </div>
                 <div class="menu-section">
                    <div class="menu-section-title">Académique</div>
                    <a href="trimestres.html" class="menu-item">
                        <i class="fas fa-calendar-week"></i><span>Trimestres</span>
                    </a>
                   
                </div>
               
                <div class="menu-section">
                    <div class="menu-section-title">Finances</div>
                    <a href="tarifs.html" class="menu-item">
                        <i class="fas fa-tag"></i><span>Tarifs</span>
                    </a>
                </div>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar"><i class="fas fa-user"></i></div>
                    <div class="user-details">
                        <h4 id="userRole">Administrateur</h4>
                        
                    </div>
                </div>
                <button class="btn-logout" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> Déconnexion
                </button>
            </div>
        </aside>
        
        <main class="main-content">
            <div class="top-bar">
                <div class="page-title">
                    <button class="mobile-menu-toggle" id="mobileMenuToggle">
                        <i class="fas fa-bars"></i>
                    </button>
                    <i class="fas fa-calendar-alt"></i>
                    <h2>Gestion des Années Scolaires</h2>
                </div>
                <div class="top-bar-actions">
                    <span id="currentDate"></span>
                </div>
            </div>

            <div class="content-wrapper">
                <div class="toolbar">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="searchInput" placeholder="Rechercher une année scolaire...">
                    </div>
                    <div class="toolbar-actions">
                        <button class="btn btn-success" onclick="openAddModal()">
                            <i class="fas fa-plus"></i> Nouvelle Année
                        </button>
                        <button class="btn btn-primary" onclick="exportAnneeScolaireCSV()">
                            <i class="fas fa-file-csv"></i> Export CSV
                        </button>
                    </div>
                </div>

                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Année Scolaire</th>
                                <th>Nombre d'Inscriptions</th>
                                <th>Nombre de Tarifs</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="anneescolaireTableBody">
                            <tr>
                                <td colspan="4" class="text-center">
                                    <div class="loading"></div> Chargement des données...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div id="anneescolaireModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">
                    <i class="fas fa-plus"></i> Nouvelle Année
                </h3>
                <button class="modal-close" onclick="closeModal('anneescolaireModal')">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <form id="anneescolaireForm">
                    <input type="hidden" id="anneescolaireId" name="id">
                    <div class="form-group">
                        <label for="anneeScolaire"><i class="fas fa-calendar"></i> Année Scolaire *</label>
                        <input type="text" id="anneeScolaire" name="anneeScolaire" required placeholder="Ex: 2024-2025">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeModal('anneescolaireModal')">
                    <i class="fas fa-times"></i> Annuler
                </button>
                <button type="button" class="btn btn-primary" onclick="saveAnneeScolaire()">
                    <i class="fas fa-save"></i> Enregistrer
                </button>
            </div>
        </div>
    </div>

    <script src="../configuration/config.js"></script>
    <script src="../js/admin-utils.js"></script>
    <script src="../js/annees-scolaires.js"></script>
</body>
</html>
